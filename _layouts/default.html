<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="description" content="Documentation for Procore developers" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <title>{{ page.title }}</title>
    <base target="_parent">
    <link rel="stylesheet" href="{{ 'assets/css/main.css' | relative_url }}">
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/nav.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  </head>
  <body>
    <nav>
    <input type="text" id="search-input" placeholder="Search Articles...">
    <ul id="results-container"></ul>
      {% for section in site.data.navigation %}
        <dl class="collapsible">
          <dt{% if page.section_title == section.title %} class="active trigger" {% endif %} class="trigger"><i class="icon fa-regular fa-square-plus"></i> {{ section.title }}</dt>
          <dl class="col_content">    
            {% for item in section.items %}
              <dd{% if item.url == page.url %} class="active"{% endif %}>
              <a href="{% if item.absolute != true %}{{ site.url }}{{ site.baseurl }}{% endif %}{{ item.url }}">
              <!-- <a href="https://0ff3-208-127-247-139.ngrok-free.app/documentation/{{ item.url }}"> -->
                {{ item.title }}
              </a>
              </dd>
            {% endfor %}
          </dl>
        </dl>
      {% endfor %}
    </nav>
    <article>
      <section>
        <header>
          <div class="title-wrapper">
            <div class="page-title-container">
              <h1>
                <button class="hamburger"><div></div><div></div><div></div></button>
                {{ page.title }}
              </h1>
              <p class="sub-header">{{ page.sub_header }}</p> <!-- Sub-header as H2 -->
            </div>
          </div>
        </header>
        <main>
          {{ content }}
          <div class="helpful-widget" id="helpful-widget">
            <span>Was this page helpful?</span>
            <button onclick="submitFeedback('yes', this)" aria-label="Yes, this page was helpful">Yes</button>
            <button onclick="submitFeedback('no', this)" aria-label="No, this page was not helpful">No</button>
            <button onclick="openFeedbackForm()" aria-label="Submit detailed feedback">Tell us more</button>
            <span class="helpful-thanks" id="helpful-thanks">Thanks for your feedback!</span>
          </div>
        </main>
      </section>
    </article>
    <script>
      // Injected at Jekyll build/serve time from site.dev_portal_base_url
      // (set in _config.yml or overridden via the DEV_PORTAL_BASE_URL env var).
      window.DEV_PORTAL_BASE_URL = "{{ site.dev_portal_base_url | escape }}";
    </script>
    <script src="{{ 'assets/js/nav.js' | relative_url }}"></script>
    <script>
      function submitFeedback(value, btn) {
        var widget = document.getElementById('helpful-widget');
        var thanks = document.getElementById('helpful-thanks');
        var buttons = widget.querySelectorAll('button[onclick^="submitFeedback"]');
        buttons.forEach(function(b) { b.classList.remove('selected'); b.disabled = true; });
        btn.classList.add('selected');
        thanks.style.display = 'inline';
        var payload = { page: window.location.pathname, helpful: value, title: document.title };
        fetch('https://script.google.com/macros/s/AKfycbyZBwlw1ESSILqL226loWwHhHKtSTSBQLaX6eTfAueGI9jLXOOsPw0j6-hHMbIoQ50/exec', {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        });
      }
      function openFeedbackForm() {
        var pageUrl = encodeURIComponent(window.location.href);
        window.open('https://docs.google.com/forms/d/e/1FAIpQLScaGQ8kEwcE-VfXLm9TVCIc9Rf-0j4HBdKSI3Q12TMgITS7KQ/viewform?usp=pp_url&entry.122610885=' + pageUrl, '_blank');
      }
    </script>
  </body>
</html>
